<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Shot · 4月AI情报</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ========== CSS Variables / Brand Tokens ========== */
:root {
  /* Colors */
  --color-yellow: #F9D71C;
  --color-teal: #2AABA8;
  --color-espresso: #1A1A1A;
  --color-background: #0a0a0a;
  --color-surface: #111;
  --color-border: rgba(255, 255, 255, 0.08);
  --color-text-primary: #ffffff;
  --color-text-secondary: rgba(255, 255, 255, 0.65);
  --color-text-tertiary: rgba(255, 255, 255, 0.35);

  /* Rarity Colors */
  --rarity-common: rgba(255, 255, 255, 0.6);
  --rarity-uncommon: #2AABA8;
  --rarity-rare: #AFA9EC;
  --rarity-legendary: #F9D71C;

  /* Fonts */
  --font-mono: 'JetBrains Mono', monospace;
  --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;

  /* Spacing */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-lg: 16px;
  --spacing-xl: 24px;

  /* Screen height */
  --screen-height: 556px;
}

/* ========== Base Styles ========== */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: var(--font-body);
  background: var(--color-espresso);
  color: var(--color-text-primary);
  overflow: hidden;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ========== Phone Container ========== */
.phone {
  width: 375px;
  background: var(--color-surface);
  border-radius: 34px;
  padding: 10px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

.screen {
  background: var(--color-background);
  border-radius: 26px;
  height: calc(var(--screen-height) + 48px);
  overflow: hidden;
  position: relative;
  cursor: grab;
}

.screen:active { cursor: grabbing; }

/* ========== Top Bar ========== */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px 4px;
  font-size: 10px;
  color: var(--color-text-tertiary);
  font-family: var(--font-mono);
  font-weight: 500;
}

/* ========== Progress Dots (6-segment) ========== */
.progress-dots {
  display: flex;
  gap: 5px;
  padding: 5px 16px 4px;
  align-items: center;
}
.progress-seg {
  flex: 1;
  height: 3px;
  border-radius: 2px;
  background: rgba(255,255,255,.1);
  transition: background 0.35s ease, transform 0.35s ease;
  transform-origin: center;
}
.progress-seg.seg-active {
  background: var(--color-yellow);
  transform: scaleY(1.5);
}
.progress-seg.seg-visited { background: rgba(249,215,28,.32); }

/* ========== Feed Container ========== */
.feed {
  display: flex;
  flex-direction: column;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  scroll-snap-type: y mandatory;
}

.slide {
  width: 100%;
  height: var(--screen-height);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  scroll-snap-align: start;
}

/* ========== Tag Strip ========== */
.tag-strip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 12px 16px 0;
}
.tag-pill {
  font-size: 9px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.slide-num {
  margin-left: auto;
  font-size: 11px;
  color: rgba(255,255,255,.48);
  font-family: var(--font-mono);
  font-weight: 600;
  letter-spacing: .04em;
}

/* ========== Hero Section ========== */
.hero {
  padding: 10px 16px 0;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.hero-label {
  font-size: 10px;
  color: var(--color-text-tertiary);
  margin-bottom: 6px;
  letter-spacing: 0.04em;
}

.hero-headline {
  font-size: 19px;
  font-weight: 800;
  color: var(--color-text-primary);
  line-height: 1.25;
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}

.hero-body {
  font-size: 12px;
  color: var(--color-text-secondary);
  line-height: 1.6;
  margin-bottom: 10px;
}

/* ========== Stats ========== */
.stat-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 8px;
}

.stat-box {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 8px;
  padding: 8px 10px;
}

.stat-val {
  font-size: 18px;
  font-weight: 700;
  font-family: var(--font-mono);
}
.stat-sub {
  font-size: 10px;
  color: var(--color-text-tertiary);
  margin-top: 1px;
}

/* ========== Person Card ========== */
.person-card {
  background: rgba(255, 255, 255, 0.04);
  border: 0.5px solid rgba(255, 255, 255, 0.08);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 8px;
  min-width: 0;
}

.person-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}

.person-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--color-text-primary);
}
.person-meta {
  font-size: 10px;
  color: var(--color-text-tertiary);
}

.person-quote {
  font-size: 11px;
  color: var(--color-text-secondary);
  line-height: 1.5;
  font-style: italic;
  border-left: 2px solid var(--color-yellow);
  padding-left: 8px;
  margin-bottom: 6px;
}

.learn-badge {
  font-size: 10px;
  color: var(--color-yellow);
  font-weight: 500;
}

/* ========== Can/Cannot Items ========== */
.can-section {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 6px;
}
.can-label {
  font-size: 9px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 10px;
  display: inline-block;
  margin-bottom: 4px;
}
.can-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  background: rgba(255, 255, 255, 0.04);
  border-radius: 8px;
  padding: 8px 10px;
}
.can-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 3px;
}
.can-text {
  font-size: 11px;
  color: var(--color-text-secondary);
  line-height: 1.45;
  flex: 1;
}

/* ========== Action Chips ========== */
.action-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(249, 215, 28, 0.12);
  border: 0.5px solid rgba(249, 215, 28, 0.35);
  border-radius: 8px;
  padding: 7px 11px;
  font-size: 11px;
  color: var(--color-yellow);
  font-weight: 500;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.action-chip:hover {
  background: rgba(249, 215, 28, 0.18);
  border-color: rgba(249, 215, 28, 0.5);
}
.action-chip.copyable { position: relative; }
.action-chip.copied::after {
  content: '✓ 已复制';
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(29, 158, 117, 0.9);
  color: white;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 9px;
  white-space: nowrap;
}
.teal-chip { background: rgba(42, 171, 168, 0.12); border-color: rgba(42, 171, 168, 0.35); color: #4FC3C1; }
.pink-chip { background: rgba(212, 83, 126, 0.15); border-color: rgba(212, 83, 126, 0.4); color: #ED93B1; }
.white-chip { background: rgba(255, 255, 255, 0.07); border-color: rgba(255, 255, 255, 0.15); color: rgba(255, 255, 255, 0.7); }
.purple-chip { background: rgba(127, 119, 221, 0.15); border-color: rgba(175, 169, 236, 0.3); color: #AFA9EC; }
.green-chip { background: rgba(99, 153, 34, 0.12); border-color: rgba(151, 196, 89, 0.3); color: #97C459; }

/* 长 Prompt：列布局 + 断行，避免 inline-flex 在窄屏把中英文拆碎 */
.action-chip.prompt-chip {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  width: 100%;
  max-width: 100%;
  gap: 6px;
}
.prompt-chip__label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  opacity: 0.88;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}
.prompt-chip__body {
  width: 100%;
  min-width: 0;
  font-size: 12px;
  line-height: 1.58;
  font-weight: 500;
  word-break: break-word;
  overflow-wrap: anywhere;
}

/* 第三/五屏已不用内部滚动；保留类名以免旧缓存报错 */
.hero.hero--scroll {
  min-height: 0;
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  justify-content: flex-start;
  padding-bottom: 8px;
}

/* ========== Bottom Bar ========== */
.bottom-bar {
  padding: 10px 16px calc(12px + env(safe-area-inset-bottom, 0px));
  border-top: 0.5px solid var(--color-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.bottom-pts {
  font-size: 10px;
  color: rgba(249, 215, 28, 0.7);
  font-family: var(--font-mono);
}
.bottom-action {
  font-size: 10px;
  color: var(--color-text-tertiary);
}

/* ========== Scroll Hint ========== */
.scroll-hint {
  position: absolute;
  bottom: 52px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  opacity: 0.35;
  pointer-events: none;
  transition: opacity 0.3s;
}
.scroll-arrow {
  width: 14px;
  height: 14px;
  border-right: 1.5px solid white;
  border-bottom: 1.5px solid white;
  transform: rotate(45deg);
  animation: bounce 2s infinite;
}
@keyframes bounce {
  0%, 100% { transform: rotate(45deg) translateY(0); }
  50% { transform: rotate(45deg) translateY(4px); }
}

/* ========== Slide 2 Carousel (horizontal) ========== */
.peer-carousel {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  border-radius: 12px;
  gap: 10px;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x;
}
.peer-panel {
  min-width: 100%;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  padding: 2px 2px 0;
}
.peer-carousel::-webkit-scrollbar { display: none; }
.peer-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 8px;
  margin-bottom: 6px;
}
.peer-dot {
  width: 7px;
  height: 3px;
  border-radius: 10px;
  background: rgba(255,255,255,.12);
  transition: background .25s ease, transform .25s ease;
}
.peer-dot.active {
  background: rgba(249,215,28,.55);
  transform: scaleX(1.4);
}

/* ========== Sources Line ========== */
.meta-source {
  font-size: 9px;
  color: rgba(255,255,255,.32);
  line-height: 1.35;
  margin-top: 6px;
}
.meta-source a {
  color: rgba(255,255,255,.45);
  text-decoration: none;
  border-bottom: 1px dotted rgba(255,255,255,.22);
}
.meta-source a:hover { color: rgba(255,255,255,.65); border-bottom-color: rgba(255,255,255,.35); }

/* ========== Blind Box Card ========== */
.card-reveal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.card-reveal-overlay.active {
  opacity: 1;
  pointer-events: all;
}
.card-box {
  width: 120px;
  height: 120px;
  background: linear-gradient(135deg, rgba(249, 215, 28, 0.2), rgba(42, 171, 168, 0.2));
  border: 2px solid rgba(249, 215, 28, 0.5);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  cursor: pointer;
  transition: transform 0.3s;
  position: relative;
}
.card-box:hover { transform: scale(1.05); }
.card-box.shimmer::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
  animation: shimmer 2s infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
  100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
}
.card-content {
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  max-width: 280px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 16px;
  padding: 24px;
  animation: cardReveal 0.5s ease-out;
}
.card-content.active { display: flex; }
@keyframes cardReveal {
  0% { opacity: 0; transform: scale(0.8) rotateY(90deg); }
  100% { opacity: 1; transform: scale(1) rotateY(0deg); }
}
.card-icon { font-size: 48px; margin-bottom: 12px; }
.card-rarity {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.card-name { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--color-text-primary); }
.card-type { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 8px; }
.card-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
.card-close {
  margin-top: 16px;
  padding: 8px 16px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  color: var(--color-text-primary);
  font-size: 12px;
  cursor: pointer;
  transition: background 0.2s;
}
.card-close:hover { background: rgba(255, 255, 255, 0.15); }
.particle {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  pointer-events: none;
  animation: particle-burst 1s ease-out forwards;
}
@keyframes particle-burst {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
}

/* ========== Screen-specific Styles ========== */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 12px;
}
.summary-box {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 8px;
  padding: 9px 10px;
  text-align: center;
}
.summary-label {
  font-size: 10px;
  color: var(--color-text-tertiary);
  margin-bottom: 4px;
}
.summary-value {
  font-size: 20px;
  font-weight: 700;
  font-family: var(--font-mono);
}
.cta-button {
  display: block;
  text-align: center;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

/* ========== Responsive ========== */
@media (max-width: 400px) {
  :root {
    --feed-chrome-top: 48px;
    --screen-height: calc(100dvh - var(--feed-chrome-top));
  }
  body {
    min-height: 100dvh;
    align-items: stretch;
  }
  .phone {
    width: 100%;
    border-radius: 0;
    padding: 0;
    height: 100dvh;
    min-height: 100dvh;
    box-shadow: none;
  }
  .screen {
    border-radius: 0;
    height: 100dvh;
    max-height: 100dvh;
  }
}
</style>
</head>
<body>

<div class="phone">
  <div class="screen" id="screen">
    <!-- Top Bar -->
    <div class="top-bar">
      <span>Daily Shot</span>
      <span id="time-display">08:24</span>
    </div>

    <!-- Progress Bar: 6 segments -->
    <div class="progress-dots" id="progress-dots">
      <div class="progress-seg seg-active" data-idx="0"></div>
      <div class="progress-seg" data-idx="1"></div>
      <div class="progress-seg" data-idx="2"></div>
      <div class="progress-seg" data-idx="3"></div>
      <div class="progress-seg" data-idx="4"></div>
      <div class="progress-seg" data-idx="5"></div>
    </div>

    <!-- Feed -->
    <div class="feed" id="feed">
      <!-- Slides will be dynamically generated -->
    </div>

    <!-- Scroll Hint -->
    <div class="scroll-hint" id="scroll-hint">
      <div class="scroll-arrow"></div>
    </div>
  </div>
</div>

<!-- Card Reveal Overlay -->
<div class="card-reveal-overlay" id="card-overlay">
  <div class="card-box shimmer" id="card-box">?</div>
  <div class="card-content" id="card-content">
    <div class="card-icon" id="card-icon"></div>
    <div class="card-rarity" id="card-rarity"></div>
    <div class="card-name" id="card-name"></div>
    <div class="card-type" id="card-type"></div>
    <div class="card-desc" id="card-desc"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="card-close" id="card-close" style="margin-top:0;flex:1">关闭</button>
      <button class="card-close" onclick="closeCardOverlay();goToSlide(0)" style="margin-top:0;flex:1;background:rgba(249,215,28,.1);color:#F9D71C;border-color:rgba(249,215,28,.25)">← 首页</button>
    </div>
  </div>
</div>

<!-- Main App Script -->

// ========== Content Data (Inline) ==========

      },
      {

// ========== LocalStorage Management ==========
const STORAGE_KEYS = {
  CAFFEINE_TOTAL: 'daily_shot_caffeine_total',
  STREAK_DAYS: 'daily_shot_streak_days',
  LAST_VISIT: 'daily_shot_last_visit',
  CARDS_COLLECTED: 'daily_shot_cards_collected'
};

function getStorageItem(key, defaultValue) {
  try {
    const item = localStorage.getItem(key);
    return item ? JSON.parse(item) : defaultValue;
  } catch (e) {
    return defaultValue;
  }
}

function setStorageItem(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {
    console.error('Storage error:', e);
  }
}

// ========== Streak & Caffeine Management ==========
function updateStreak() {
  const today = new Date().toDateString();
  const lastVisit = getStorageItem(STORAGE_KEYS.LAST_VISIT, null);
  let streakDays = getStorageItem(STORAGE_KEYS.STREAK_DAYS, 0);

  if (lastVisit !== today) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);

    if (lastVisit === yesterday.toDateString()) streakDays += 1;
    else if (lastVisit !== null) streakDays = 1;
    else streakDays = 1;

    setStorageItem(STORAGE_KEYS.STREAK_DAYS, streakDays);
    setStorageItem(STORAGE_KEYS.LAST_VISIT, today);
  }
  return streakDays;
}

function addCaffeine(amount) {
  const total = getStorageItem(STORAGE_KEYS.CAFFEINE_TOTAL, 0);
  const newTotal = total + amount;
  setStorageItem(STORAGE_KEYS.CAFFEINE_TOTAL, newTotal);
  return newTotal;
}

// ========== Copy to Clipboard ==========
function copyToClipboard(text, element) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showCopyFeedback(element)).catch(() => fallbackCopy(text, element));
  } else {
    fallbackCopy(text, element);
  }
}

function fallbackCopy(text, element) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showCopyFeedback(element);
  } catch (e) {
    console.error('Copy failed:', e);
  }
  document.body.removeChild(textarea);
}

function showCopyFeedback(element) {
  element.classList.add('copied');
  setTimeout(() => element.classList.remove('copied'), 2000);
}

// ========== Sources ==========
function renderSources(sources) {
  if (!sources || !sources.length) return '';
  const parts = sources.map((s) => `<a href="${s.url}" target="_blank" rel="noreferrer">${s.label}</a> · ${s.date}`);
  return `<div class="meta-source">via ${parts.join(' · ')}</div>`;
}

function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

/** 先转义 HTML，再把 **加粗** 转为 <strong>（仅用于可信静态文案） */
function formatInlineBold(str) {
  return escapeHtml(str).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

function hookHeadlineOneLine(headline) {
  return String(headline || '').replace(/\n/g, ' ').trim();
}

/** 取卡片标题第一行（首页大标题只露主名，细节在下滑卡片里） */
function hookHeadlineFirstLine(headline) {
  return String(headline || '').split(/\n/)[0].trim();
}

/** 首页赛事日期压成「4.10 - 4.11」，避免套娃括号 */
function hookCompactDateRange(achievementTime) {
  const raw = String(achievementTime || '');
  const m = raw.match(/(\d{4})-(\d{2})-(\d{2})\s*至\s*(\d{2})-(\d{2})/);
  if (m) return `${Number(m[2])}.${Number(m[3])} - ${Number(m[4])}.${Number(m[5])}`;
  return '';
}

/** 横向双卡含 gap 时，scrollLeft 步进不等于 clientWidth，用 offsetLeft 对齐 */
function getPeerPanelScrollLeft(carousel, index) {
  const panels = carousel.querySelectorAll('.peer-panel');
  const p = panels[index];
  return p ? p.offsetLeft : 0;
}

function getPeerCarouselIndex(carousel) {
  const panels = carousel.querySelectorAll('.peer-panel');
  if (!panels.length) return 0;
  let best = 0;
  let bestDist = Infinity;
  for (let i = 0; i < panels.length; i++) {
    const d = Math.abs(carousel.scrollLeft - panels[i].offsetLeft);
    if (d < bestDist) {
      bestDist = d;
      best = i;
    }
  }
  return best;
}

// ========== Navigation ==========
function getSlideStepPx() {
  const el = feed && feed.querySelector('.slide');
  if (el) return el.getBoundingClientRect().height;
  return 556;
}

function goToSlide(index) {
  currentSlide = Math.max(0, Math.min(totalSlides - 1, index));
  const step = getSlideStepPx();
  feed.style.transform = `translateY(-${currentSlide * step}px)`;
  progressSegs.forEach((seg, i) => {
    seg.classList.toggle('seg-active',  i === currentSlide);
    seg.classList.toggle('seg-visited', i <  currentSlide);
  });
  scrollHint.style.opacity = currentSlide < totalSlides - 1 ? '0.35' : '0';
  refreshPeerAuto();
}

// ========== Slide2：进入后一次性自动滑到第二张（不循环） ==========
const PEER_AUTO_ONCE_DELAY_MS = 1000;

function refreshPeerAuto() {
  if (peerAutoTimer) {
    clearTimeout(peerAutoTimer);
    peerAutoTimer = null;
  }
  if (currentSlide !== 1) return;
  const carousel = document.getElementById('peer-carousel');
  if (!carousel) return;
  const panels = carousel.querySelectorAll('.peer-panel');
  if (panels.length < 2) return;
  peerAutoTimer = setTimeout(() => {
    peerAutoTimer = null;
    const c = document.getElementById('peer-carousel');
    if (!c || currentSlide !== 1) return;
    if (getPeerCarouselIndex(c) !== 0) return;
    c.scrollTo({ left: getPeerPanelScrollLeft(c, 1), behavior: 'smooth' });
  }, PEER_AUTO_ONCE_DELAY_MS);
}

// ========== Touch/Mouse Events ==========
function isInsidePeerCarousel(target) {
  if (!target) return false;
  return !!(target.closest && target.closest('#peer-carousel'));
}

screen.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  startX = t.clientX; startY = t.clientY;
  isDragging = true; hasMoved = false; gestureLock = null;
  startedInPeerCarousel = isInsidePeerCarousel(e.target);
}, { passive: true });

screen.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  const t = e.touches[0];
  const dx = t.clientX - startX;
  const dy = t.clientY - startY;
  const adx = Math.abs(dx);
  const ady = Math.abs(dy);

  if (!gestureLock && (adx > 8 || ady > 8)) {
    gestureLock = adx > ady ? 'h' : 'v';
  }

  if (startedInPeerCarousel && gestureLock === 'h') {
    hasMoved = false;
    return;
  }

  if (gestureLock === 'v' && ady > 8) hasMoved = true;
}, { passive: true });

screen.addEventListener('touchend', (e) => {
  if (!isDragging) return;
  if (startedInPeerCarousel && gestureLock === 'h') { isDragging = false; hasMoved = false; return; }
  if (!hasMoved) { isDragging = false; return; }
  const t = e.changedTouches[0];
  const dy = startY - t.clientY;
  if (dy > 40) goToSlide(currentSlide + 1);
  else if (dy < -40) goToSlide(currentSlide - 1);
  isDragging = false; hasMoved = false; gestureLock = null;
}, { passive: true });

screen.addEventListener('mousedown', (e) => {
  startX = e.clientX; startY = e.clientY;
  isDragging = true; hasMoved = false; gestureLock = null;
  startedInPeerCarousel = isInsidePeerCarousel(e.target);
});
screen.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;
  const adx = Math.abs(dx);
  const ady = Math.abs(dy);
  if (!gestureLock && (adx > 6 || ady > 6)) gestureLock = adx > ady ? 'h' : 'v';
  if (startedInPeerCarousel && gestureLock === 'h') { hasMoved = false; return; }
  if (gestureLock === 'v' && ady > 8) hasMoved = true;
});
screen.addEventListener('mouseup', (e) => {
  if (!isDragging) return;
  if (startedInPeerCarousel && gestureLock === 'h') { isDragging = false; hasMoved = false; return; }
  if (!hasMoved) { isDragging = false; return; }
  const dy = startY - e.clientY;
  if (dy > 30) goToSlide(currentSlide + 1);
  else if (dy < -30) goToSlide(currentSlide - 1);
  isDragging = false; hasMoved = false; gestureLock = null;
});

// ========== Copy Prompt ==========

  copyToClipboard(text, element);
};

// ========== Card Reveal ==========
window.revealCard = function() {
  const randomCard = DAILY_CONTENT.cardPool[Math.floor(Math.random() * DAILY_CONTENT.cardPool.length)];
  cardOverlay.classList.add('active');
  cardBox.style.display = 'flex';
  cardContent.style.display = '';
  cardContent.classList.remove('active');

  cardBox.onclick = () => {
    cardBox.style.display = 'none';
    cardContent.classList.add('active');

    document.getElementById('card-icon').textContent  = randomCard.icon;
    document.getElementById('card-name').textContent  = randomCard.name;
    document.getElementById('card-type').textContent  = randomCard.type;
    document.getElementById('card-desc').textContent  = randomCard.description;

    const rarityEl = document.getElementById('card-rarity');
    rarityEl.textContent = randomCard.rarity;
    const rs = getRarityStyle(randomCard.rarity);
    rarityEl.style.background = rs.bg;
    rarityEl.style.color       = rs.color;
    rarityEl.style.border      = `1px solid ${rs.border}`;

    if (randomCard.rarity === '稀有' || randomCard.rarity === '传说') createConfetti(randomCard.color);

    const collected = getStorageItem(STORAGE_KEYS.CARDS_COLLECTED, []);
    if (!collected.find(c => c.id === randomCard.id)) {
      collected.push(randomCard);
      setStorageItem(STORAGE_KEYS.CARDS_COLLECTED, collected);
    }
    addCaffeine(DAILY_CONTENT.close.caffeineEarned);
  };
};

window.closeCardOverlay = function() {
  cardOverlay.classList.remove('active');
  cardContent.classList.remove('active');
  cardContent.style.display = '';
  cardBox.style.display = '';
};

function createConfetti(color) {
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.background = color;
    p.style.left = '50%';
    p.style.top  = '50%';
    const angle = (Math.PI * 2 * i) / 20;
    const dist  = 100 + Math.random() * 100;
    p.style.setProperty('--tx', `${Math.cos(angle) * dist}px`);
    p.style.setProperty('--ty', `${Math.sin(angle) * dist}px`);
    cardOverlay.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

document.getElementById('card-close').onclick = closeCardOverlay;

window.addEventListener('resize', () => {
  goToSlide(currentSlide);
});

// ========== Initialize ==========
function init() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  document.getElementById('time-display').textContent =
    `${h < 10 ? '0' : ''}${h}:${m < 10 ? '0' : ''}${m}`;
  renderSlides();
  goToSlide(0);
}
init();
</script>
